name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui:
    name: UI — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Use a placeholder so the build succeeds without a real API server
          NEXT_PUBLIC_API_BASE: http://localhost:3001/api

  backend:
    name: Backend — type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        # --skipLibCheck avoids errors from @contentengine/* workspace packages
        # that are not built in CI. Full type-checking requires those packages
        # to be built first; tracked separately from this PR.
        run: npx tsc --noEmit --skipLibCheck
